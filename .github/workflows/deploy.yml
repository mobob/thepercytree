name: Deploy

# Publish on every push to main. No secrets: AWS access is via short-lived
# OIDC credentials from the role provisioned by the CDK app (infra/).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Don't pile up overlapping deploys; let the newest win.
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  id-token: write # required to request the OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region: ca-central-1

      - name: Build and deploy
        run: bun run deploy
        env:
          DEPLOY_BUCKET: ${{ vars.DEPLOY_BUCKET }}
          DEPLOY_DISTRIBUTION_ID: ${{ vars.DEPLOY_DISTRIBUTION_ID }}
          AWS_REGION: ca-central-1
