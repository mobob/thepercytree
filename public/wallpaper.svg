<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" preserveAspectRatio="xMidYMid slice">
  <!-- recreation of the "rainbow strip" iOS default: a soft spectrum band on near-black -->
  <defs>
    <linearGradient id="rain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="17%" stop-color="#ff9500"/>
      <stop offset="33%" stop-color="#ffcc00"/>
      <stop offset="50%" stop-color="#34c759"/>
      <stop offset="66%" stop-color="#32ade6"/>
      <stop offset="83%" stop-color="#5856d6"/>
      <stop offset="100%" stop-color="#af52de"/>
    </linearGradient>
    <linearGradient id="vfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="43%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="57%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <mask id="band">
      <rect width="1080" height="1920" fill="url(#vfade)"/>
    </mask>
    <filter id="soft" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="#0a0a0d"/>
  <g mask="url(#band)" filter="url(#soft)">
    <rect width="1080" height="1920" fill="url(#rain)"/>
  </g>
</svg>
